<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ISRO Inventory — Login</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #05060f;
      height: 100vh;
      overflow: hidden;
      font-family: 'Segoe UI', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    canvas {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 0;
    }

    .content {
      position: relative;
      z-index: 1;
      animation: fadeIn 0.8s ease forwards;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .card {
      background: rgba(13, 18, 36, 0.85);
      backdrop-filter: blur(16px);
      border: 1px solid #1e2a4a;
      border-radius: 20px;
      padding: 40px 44px;
      width: 420px;
    }

    .top-label {
      font-size: 10px;
      color: #e8631a;
      letter-spacing: 3px;
      text-transform: uppercase;
      margin-bottom: 6px;
    }

    .role-badge {
      display: inline-block;
      background: rgba(232,99,26,0.15);
      border: 1px solid rgba(232,99,26,0.3);
      color: #e8631a;
      font-size: 11px;
      padding: 3px 10px;
      border-radius: 20px;
      margin-bottom: 20px;
    }

    h1 {
      font-size: 26px;
      color: #ffffff;
      font-weight: 700;
      margin-bottom: 6px;
    }

    .sub {
      font-size: 12px;
      color: #8899aa;
      margin-bottom: 28px;
    }

    .tabs {
      display: flex;
      background: #05060f;
      border-radius: 8px;
      padding: 3px;
      margin-bottom: 24px;
    }

    .tab {
      flex: 1;
      text-align: center;
      padding: 8px;
      font-size: 13px;
      border-radius: 6px;
      cursor: pointer;
      color: #8899aa;
      transition: all 0.2s;
    }

    .tab.active {
      background: #e8631a;
      color: #fff;
      font-weight: 600;
    }

    .field { margin-bottom: 16px; }

    .field label {
      display: block;
      font-size: 11px;
      color: #8899aa;
      margin-bottom: 6px;
      letter-spacing: 0.3px;
    }

    .field input {
      width: 100%;
      background: #05060f;
      border: 1px solid #1e2a4a;
      border-radius: 8px;
      padding: 11px 14px;
      font-size: 13px;
      color: #e2e8f0;
      outline: none;
      transition: border-color 0.2s;
    }

    .field input:focus { border-color: #e8631a; }
    .field input::placeholder { color: #2a3a5a; }

    .forgot {
      text-align: right;
      font-size: 11px;
      color: #e8631a;
      margin-top: -8px;
      margin-bottom: 20px;
      cursor: pointer;
    }

    .forgot:hover { text-decoration: underline; }

    .btn {
      width: 100%;
      background: #e8631a;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 12px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
      letter-spacing: 0.3px;
    }

    .btn:hover { background: #cf5515; }

    .back {
      text-align: center;
      margin-top: 18px;
      font-size: 11px;
      color: #8899aa;
      cursor: pointer;
    }

    .back span {
      color: #e8631a;
      cursor: pointer;
    }

    .back span:hover { text-decoration: underline; }

    /* OTP Screen */
    .otp-screen { display: none; }

    .otp-inputs {
      display: flex;
      gap: 10px;
      justify-content: center;
      margin: 24px 0;
    }

    .otp-inputs input {
      width: 52px;
      height: 52px;
      text-align: center;
      font-size: 22px;
      font-weight: 700;
      background: #05060f;
      border: 1px solid #1e2a4a;
      border-radius: 10px;
      color: #fff;
      outline: none;
      transition: border-color 0.2s;
    }

    .otp-inputs input:focus { border-color: #e8631a; }

    .resend {
      text-align: center;
      font-size: 11px;
      color: #8899aa;
      margin-bottom: 20px;
    }

    .resend span { color: #e8631a; cursor: pointer; }
  </style>
</head>
<body>

  <canvas id="stars"></canvas>

  <div class="content">
    <div class="card">

      <!-- Login / Signup -->
      <div id="auth-screen">
        <div class="top-label">ISRO INVENTORY</div>
        <div class="role-badge" id="roleBadge">Supply Manager</div>
        <h1>Welcome back</h1>
        <div class="sub">Sign in to access your dashboard</div>

        <div class="tabs">
          <div class="tab active" onclick="switchTab('login')">Sign in</div>
          <div class="tab" onclick="switchTab('signup')">Create account</div>
        </div>

        <div id="login-form">
          <div class="field">
            <label>Employee ID / Email</label>
            <input type="text" placeholder="e.g. isro-2026@sac.gov.in"/>
          </div>
          <div class="field">
            <label>Password</label>
            <input type="password" placeholder="••••••••"/>
          </div>
          <div class="forgot" onclick="showOTP()">Forgot password? Get OTP →</div>
          <button class="btn" onclick="goToDashboard()">Sign in →</button>
        </div>

        <div id="signup-form" style="display:none">
          <div class="field">
            <label>Full Name</label>
            <input type="text" placeholder="e.g. Vikram Nair"/>
          </div>
          <div class="field">
            <label>Employee ID</label>
            <input type="text" placeholder="ISRO-2026-XXXX"/>
          </div>
          <div class="field">
            <label>Email</label>
            <input type="email" placeholder="name@isro.gov.in"/>
          </div>
          <div class="field">
            <label>Password</label>
            <input type="password" placeholder="••••••••"/>
          </div>
          <button class="btn" onclick="goToDashboard()">Create account →</button>
        </div>

        <div class="back">Wrong role? <span onclick="goBack()">Go back</span></div>
      </div>

      <!-- OTP Screen -->
      <div id="otp-screen" style="display:none">
        <div class="top-label">PASSWORD RESET</div>
        <h1>Check your email</h1>
        <div class="sub">We sent a 4-digit OTP to your registered email</div>

        <div class="otp-inputs">
          <input type="text" maxlength="1" oninput="moveNext(this, 1)"/>
          <input type="text" maxlength="1" oninput="moveNext(this, 2)"/>
          <input type="text" maxlength="1" oninput="moveNext(this, 3)"/>
          <input type="text" maxlength="1" oninput="moveNext(this, 4)"/>
        </div>

        <div class="resend">Didn't receive it? <span>Resend OTP</span></div>
        <button class="btn" onclick="verifyOTP()">Verify & Reset Password →</button>
        <div class="back" style="margin-top:14px">
          <span onclick="showLogin()">← Back to login</span>
        </div>
      </div>

    </div>
  </div>

  <script>
    // Set role badge
    const role = localStorage.getItem('isro_role');
    if (role === 'technician') {
      document.getElementById('roleBadge').textContent = 'Field Technician';
    }

    function switchTab(tab) {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      event.target.classList.add('active');
      document.getElementById('login-form').style.display = tab === 'login' ? 'block' : 'none';
      document.getElementById('signup-form').style.display = tab === 'signup' ? 'block' : 'none';
    }

    function showOTP() {
      document.getElementById('auth-screen').style.display = 'none';
      document.getElementById('otp-screen').style.display = 'block';
    }

    function showLogin() {
      document.getElementById('otp-screen').style.display = 'none';
      document.getElementById('auth-screen').style.display = 'block';
    }

    function verifyOTP() {
      showLogin();
    }

    function goBack() {
      window.location.href = 'role-select.html';
    }

    function goToDashboard() {
      window.location.href = 'dashboard.html';
    }

    function moveNext(input, index) {
      if (input.value.length === 1 && index < 4) {
        input.parentElement.children[index].focus();
      }
    }

    // Starfield
    const canvas = document.getElementById('stars');
    const ctx = canvas.getContext('2d');
    let stars = [];
    let mouse = { x: window.innerWidth/2, y: window.innerHeight/2 };

    function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }

    function createStars() {
      stars = [];
      for (let i = 0; i < 200; i++) {
        stars.push({
          x: Math.random() * canvas.width,
          y: Math.random() * canvas.height,
          r: Math.random() * 1.5 + 0.3,
          depth: Math.random() * 3 + 1,
          opacity: Math.random() * 0.8 + 0.2,
          twinkle: Math.random() * 0.02 + 0.005,
          twinkleDir: Math.random() > 0.5 ? 1 : -1,
        });
      }
    }

    window.addEventListener('mousemove', e => { mouse.x = e.clientX; mouse.y = e.clientY; });

    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      stars.forEach(s => {
        const ox = (mouse.x - canvas.width/2) / (canvas.width/2) * s.depth * 6;
        const oy = (mouse.y - canvas.height/2) / (canvas.height/2) * s.depth * 6;
        s.opacity += s.twinkle * s.twinkleDir;
        if (s.opacity >= 1 || s.opacity <= 0.1) s.twinkleDir *= -1;
        ctx.beginPath();
        ctx.arc(s.x + ox, s.y + oy, s.r, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(255,255,255,${s.opacity})`;
        ctx.fill();
      });
      requestAnimationFrame(draw);
    }

    resize(); createStars(); draw();
    window.addEventListener('resize', () => { resize(); createStars(); });
  </script>

</body>
</html>
